name: Terraform Code Build Workflow-CI

on:
  push:
    branches:
      - main
      - feature

  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:
  Terraform-Build-CI-Pipeline:
    runs-on: ubuntu-latest
    defaults:
        run:
          working-directory: ./Environment
    steps:
      - name: Terraform Code Checkout
        uses: actions/checkout@v4
        
      - name: Azure Login
        uses: Azure/login@v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }} 
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Hashicorp Setup
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init Plan validate apply Infra Code Deployment
        run: |
          terraform init
          terraform validate
          terraform plan
          terraform apply --auto-approve
