name: Terraform pipeline CI

on:
  push:
    branches:
      - main
      - release

  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:
  my_job:
    name: Deploy to staging production strategy
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run a one-line script
        run: echo Hello, world!

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init Validate Plan
        run: |
          terraform init
          terraform validate
          terraform plan
